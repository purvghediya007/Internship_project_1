<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Create Issue | AccionLAND - RVS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
  :root{
    --bg1:#f8fafc;
    --bg2:#eef2ff;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e5e7eb;
    --shadow: 0 16px 40px rgba(15,23,42,0.08);
    --shadow2: 0 22px 55px rgba(15,23,42,0.12);

    --brand1:#0b5ed7;
    --brand2:#2563eb;
    --brand3:#1d4ed8;
  }

  *{ box-sizing:border-box; }
  body{
    font-family:"Inter",sans-serif;
    background: radial-gradient(1200px 700px at 20% 0%, #dbeafe 0%, transparent 55%),
                radial-gradient(1200px 700px at 80% 0%, #e0e7ff 0%, transparent 55%),
                linear-gradient(180deg,var(--bg1),var(--bg2));
    color:var(--text);
  }

  /* ===== TOPBAR ===== */
  .topbar{
    background: linear-gradient(90deg, var(--brand1), var(--brand2));
    box-shadow: 0 14px 40px rgba(2,6,23,0.25);
    border-bottom: 1px solid rgba(255,255,255,0.18);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    font-weight:900;
    letter-spacing:0.4px;
  }

  .brand-logo{
    height:40px;
    width:auto;
    border-radius:10px;
    object-fit:contain;
    background: rgba(255,255,255,0.18);
    padding:0px;
  }

  .top-right-meta{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:800;
    color:#fff;
    opacity:0.95;
    flex-wrap:wrap;
  }

  .meta-pill{
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.22);
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 13px;
    display:flex;
    align-items:center;
    gap:8px;
    backdrop-filter: blur(6px);
  }

  /* ===== PAGE WRAP ===== */
  .page-wrap{
    max-width: 1150px;
    margin: 18px auto 60px auto;
    padding: 0 12px;
  }

  /* ===== ALERT ===== */
  .soft-alert{
    border-radius: 14px;
    border: 1px solid #fde68a;
    background: linear-gradient(180deg,#fffbeb,#fff7ed);
    color:#92400e;
    font-weight:800;
    box-shadow: 0 10px 25px rgba(2,6,23,0.06);
  }

  /* ===== LEGEND ===== */
  .legend-wrap{
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    padding: 12px;
    margin-bottom: 14px;
  }

  .legend-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:900;
    margin-bottom:10px;
  }

  .legend-grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  .legend-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border-radius: 999px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: #fff;
    font-weight:800;
    font-size: 13px;
    box-shadow: 0 10px 22px rgba(15,23,42,0.06);
  }

  .dot{
    width: 10px;
    height: 10px;
    border-radius: 999px;
    display:inline-block;
  }

  .dot-red{ background:#ef4444; }
  .dot-blue{ background:#2563eb; }
  .dot-green{ background:#16a34a; }
  .dot-brown{ background:#8b4513; }
  .dot-pink{ background:#fb7185; }
  .dot-black{ background:#111827; }

  /* ===== BUTTONS ===== */
  .btn{
    border-radius: 14px;
    font-weight: 800;
    padding: 10px 14px;
  }

  .btn-primary{
    background: linear-gradient(90deg, var(--brand2), var(--brand3));
    border: none;
    box-shadow: 0 14px 30px rgba(37,99,235,0.25);
  }
  .btn-primary:hover{
    transform: translateY(-1px);
    box-shadow: 0 18px 36px rgba(37,99,235,0.30);
  }

  .btn-outline-primary{
    border: 1px solid #c7d2fe;
    background: #fff;
  }

  .btn-success{
    background: linear-gradient(90deg,#16a34a,#22c55e);
    border: none;
    box-shadow: 0 14px 30px rgba(34,197,94,0.22);
  }

  /* ===== PROBLEM CARD ===== */
  .problem{
    border-radius: 18px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg,#ffffff,#f8fafc);
    box-shadow: var(--shadow);
    padding: 14px;
    margin-top: 14px;
    transition: all 0.25s ease;
    animation: popIn 0.25s ease;
  }
  .problem:hover{
    transform: translateY(-2px);
    box-shadow: var(--shadow2);
  }

  @keyframes popIn{
    from{ transform: translateY(8px); opacity:0; }
    to{ transform: translateY(0); opacity:1; }
  }

  .problem-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom: 10px;
  }

  .problem-title{
    font-weight: 900;
    font-size: 15px;
    margin:0;
    display:flex;
    align-items:center;
    gap:10px;
  }

  .badge-soft{
    font-size: 12px;
    font-weight: 900;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
  }

  .form-select, .form-control{
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 10px 12px;
    font-weight: 700;
    box-shadow: none !important;
  }
  .form-select:focus, .form-control:focus{
    border-color:#60a5fa;
  }

  .hint{
    font-size: 13px;
    color: var(--muted);
    font-weight: 700;
    margin-top: 8px;
  }

  /* ===== PDF CONTROLS ===== */
  .pdf-controls{
    display:flex;
    gap:10px;
    margin: 14px 0 10px 0;
    position: sticky;
    top: 70px;
    z-index: 40;
    padding: 10px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
  }

  .pdf-controls .btn{
    flex:1;
  }

  /* ===== PDF VIEW ===== */
  .pdf-wrapper{
    background: linear-gradient(180deg,#0b1220,#0f172a);
    border-radius: 18px;
    padding: 12px;
    box-shadow: 0 22px 60px rgba(2,6,23,0.35);
    overflow-x: auto;
  }

  #pdfCanvas{
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.08);
    background: #111827;
    max-width: 100%;
    height: auto;
    touch-action: manipulation;
  }

  .mark-tip{
    margin-top: 10px;
    padding: 12px;
    border-radius: 16px;
    border: 1px solid #dbeafe;
    background: linear-gradient(180deg,#eff6ff,#ffffff);
    box-shadow: 0 10px 25px rgba(15,23,42,0.06);
    font-weight: 800;
    color:#1e3a8a;
    display:flex;
    align-items:flex-start;
    gap:10px;
  }

  /* ===== OUTPUT ===== */
  #output{
    border-radius: 16px;
    border: 1px solid rgba(16,185,129,0.35);
    background: #0b1220 !important;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 768px){
    .brand-logo{ height: 34px; }
    .top-right-meta{ justify-content:flex-end; }
    .pdf-controls{ top: 62px; }
  }
</style>
</head>

<body>

<!-- TOP BAR -->
<nav class="navbar navbar-dark px-3 topbar">
  <div class="d-flex align-items-center justify-content-between w-100">
    <span class="navbar-brand brand">
      <!-- ✅ Update logo path if needed -->
      <img src="../manager/logo.png" alt="AccionLAND Logo" class="brand-logo">
      AccionLAND - RVS
    </span>

    <div class="top-right-meta">
      <span class="meta-pill">
        <i class="bi bi-layers-fill"></i>
        <strong id="floorText"></strong>
      </span>
      <span class="meta-pill">
        <i class="bi bi-door-open-fill"></i>
        <strong id="officeText"></strong>
      </span>
    </div>
  </div>
</nav>

<div class="page-wrap">

  <!-- BASE PDF WARNING -->
  <div id="noBasePdf" class="alert soft-alert d-none">
    ⚠ Base floor plan not uploaded for your floor.
  </div>

  <!-- LEGEND -->
  <div class="legend-wrap">
    <div class="legend-title">
      <i class="bi bi-palette-fill text-primary"></i>
      Marking Legend
    </div>

    <div class="legend-grid">
      <span class="legend-pill"><span class="dot dot-red"></span> Crack</span>
      <span class="legend-pill"><span class="dot dot-blue"></span> Leakage</span>
      <span class="legend-pill"><span class="dot dot-green"></span> Dampness</span>
      <span class="legend-pill"><span class="dot dot-brown"></span> Crack + Dampness</span>
      <span class="legend-pill"><span class="dot dot-pink"></span> Dampness + Leakage</span>
      <span class="legend-pill"><span class="dot dot-black"></span> Other</span>
    </div>
  </div>

  <button class="btn btn-primary w-100 mb-2" onclick="addProblem()">
    <i class="bi bi-plus-circle-fill me-1"></i> Add Structure Problem
  </button>

  <div id="problems"></div>

  <div class="mark-tip">
    <i class="bi bi-info-circle-fill"></i>
    <div>
      Tap / Click on the PDF to add a numbered mark for the <strong>last added structure</strong>.
      Use <strong>Prev/Next</strong> to mark on different pages.
    </div>
  </div>

  <!-- PDF CONTROLS -->
  <div class="pdf-controls">
    <button class="btn btn-outline-primary" onclick="prevPage()">
      <i class="bi bi-arrow-left-circle"></i> Prev
    </button>
    <button class="btn btn-outline-primary" onclick="nextPage()">
      Next <i class="bi bi-arrow-right-circle"></i>
    </button>
  </div>

  <!-- PDF VIEW -->
  <div class="pdf-wrapper">
    <canvas id="pdfCanvas"></canvas>
  </div>

  <button class="btn btn-success w-100 mt-3" onclick="submitIssue()">
    <i class="bi bi-check2-circle me-1"></i> Submit Issue
  </button>

  <pre id="output" class="text-success p-3 mt-3"></pre>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= CONFIG ================= */
const API = "https://accionland-rvs.onrender.com";
const token = localStorage.getItem("token");

if (!token) {
  location.href = "../login.html";
}

/* ================= USER INFO ================= */
document.getElementById("floorText").innerText =
  "Floor: " + localStorage.getItem("floorNumber");

document.getElementById("officeText").innerText =
  "Office: " + localStorage.getItem("officeNumber");

/* ================= STATE ================= */
let problems = [];
let marks = [];
let pdfDocJs;
let basePdfUrl;
let pageIndex = 0;
let scale = 1.4;

/* ================= LOAD BASE PDF ================= */
async function loadBasePdf() {
  const res = await fetch(API + "/api/floor-plans/my", {
    headers: { Authorization: "Bearer " + token },
  });

  if (!res.ok) {
    document.getElementById("noBasePdf").classList.remove("d-none");
    return;
  }

  const data = await res.json();
  if (!data.planPdf) {
    document.getElementById("noBasePdf").classList.remove("d-none");
    return;
  }

  basePdfUrl = data.planPdf;
  pdfDocJs = await pdfjsLib.getDocument(basePdfUrl).promise;
  renderPage();
}
loadBasePdf();

/* ================= STRUCTURE ================= */
window.addProblem = function () {
  const i = problems.length;
  problems.push({ pdfMarks: [] });

  const div = document.createElement("div");
  div.className = "problem";
  div.innerHTML = `
    <div class="problem-head">
      <h6 class="problem-title">
        <i class="bi bi-building-fill text-primary"></i>
        Structure ${i + 1}
      </h6>
      <span class="badge-soft">Tap PDF to mark</span>
    </div>

    <select class="form-select mb-2" onchange="problems[${i}].structureType=this.value">
      <option value="">Structure</option>
      <option>wall</option><option>beam</option><option>column</option>
      <option>roof</option><option>floor</option><option>facade</option><option>other</option>
    </select>

    <select class="form-select mb-2" onchange="problems[${i}].direction=this.value">
      <option value="">Direction</option>
      <option>north</option><option>south</option><option>east</option><option>west</option><option>north-west</option><option>north-east</option><option>south-west</option><option>south-east</option>
    </select>

    <select class="form-select mb-2" onchange="handleIssue(${i},this.value)">
      <option value="">Issue</option>
      <option value="crack">Crack</option>
      <option value="dampness">Dampness</option>
      <option value="leakage">Leakage</option>
      <option value="crack_dampness">Crack + Dampness</option>
      <option value="dampness_leakage">Dampness + Leakage</option>
      <option value="other">Other</option>
    </select>

    <select id="crack_${i}" class="form-select mb-2 d-none"
      onchange="problems[${i}].crackType=this.value">
      <option value="">Crack Type</option>
      <option>minor</option><option>medium</option><option>severe</option>
    </select>

    <select id="damp_${i}" class="form-select mb-2 d-none"
      onchange="problems[${i}].dampnessLevel=this.value">
      <option value="">Dampness Level</option>
      <option>low</option><option>medium</option><option>high</option>
    </select>

    <select class="form-select mb-2"
      onchange="problems[${i}].riskLevel=this.value">
      <option value="">Risk Level</option>
      <option>low</option><option>medium</option><option>high</option>
    </select>

    <textarea class="form-control mb-2"
      placeholder="Description"
      onchange="problems[${i}].description=this.value"></textarea>

    <input type="file" class="form-control" multiple
      onchange="problems[${i}].images=this.files" />

    <div class="hint">Tip: Add mark on PDF after selecting issue type.</div>
  `;
  document.getElementById("problems").appendChild(div);
};

function handleIssue(i, v) {
  problems[i].issueType = v;
  document.getElementById(`crack_${i}`).classList.add("d-none");
  document.getElementById(`damp_${i}`).classList.add("d-none");

  if (v === "crack") document.getElementById(`crack_${i}`).classList.remove("d-none");
  if (v === "dampness") document.getElementById(`damp_${i}`).classList.remove("d-none");
  if (v === "crack_dampness") {
    document.getElementById(`crack_${i}`).classList.remove("d-none");
    document.getElementById(`damp_${i}`).classList.remove("d-none");
  }

  // optional: leakage doesn't need dampnessLevel
  if (v === "dampness_leakage") {
    document.getElementById(`damp_${i}`).classList.remove("d-none");
  }
}

/* ================= COLOR HELPERS ================= */
function getColor(type) {
  return type === "crack" ? "red"
    : type === "dampness" ? "green"
    : type === "crack_dampness" ? "brown"
    : type === "leakage" ? "blue"
    : type === "dampness_leakage" ? "pink"
    : "black";
}

function getPdfRgb(color) {
  return color === "red" ? PDFLib.rgb(1, 0, 0)
    : color === "green" ? PDFLib.rgb(0, 1, 0)
    : color === "blue" ? PDFLib.rgb(0, 0, 1)
    : color === "brown" ? PDFLib.rgb(0.6, 0.3, 0.1)
    : color === "pink" ? PDFLib.rgb(1, 0.4, 0.7)
    : PDFLib.rgb(0, 0, 0);
}

/* ================= PDF RENDER ================= */
async function renderPage() {
  const page = await pdfDocJs.getPage(pageIndex + 1);
  const viewport = page.getViewport({ scale });

  pdfCanvas.width = viewport.width;
  pdfCanvas.height = viewport.height;

  const ctx = pdfCanvas.getContext("2d");
  await page.render({ canvasContext: ctx, viewport }).promise;

  // Draw marks with numbering
  marks.forEach((m, index) => {
    if (m.pageIndex === pageIndex) {
      ctx.beginPath();
      ctx.arc(m.x, m.y, 8, 0, Math.PI * 2);
      ctx.strokeStyle = m.color;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = m.color;
      ctx.font = "14px Inter";
      ctx.fillText(index + 1, m.x + 10, m.y - 10);
    }
  });

  pdfCanvas.onclick = e => {
    if (!problems.length) return alert("Add structure first");

    const rect = pdfCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const p = problems[problems.length - 1];
    const color = getColor(p.issueType);

    marks.push({ pageIndex, x, y, color });
    p.pdfMarks.push({ pageIndex, x, y });
    renderPage();
  };
}

function nextPage() {
  if (pageIndex < pdfDocJs.numPages - 1) {
    pageIndex++;
    renderPage();
  }
}

function prevPage() {
  if (pageIndex > 0) {
    pageIndex--;
    renderPage();
  }
}

/* ================= SUBMIT ISSUE ================= */
async function submitIssue() {
  if (!problems.length) return alert("Add at least one structure");

  const bytes = await fetch(basePdfUrl).then(r => r.arrayBuffer());
  const pdf = await PDFLib.PDFDocument.load(bytes);
  const pages = pdf.getPages();

  marks.forEach((m, index) => {
    const color = getPdfRgb(m.color);

    // draw circle
    pages[m.pageIndex].drawCircle({
      x: m.x / scale,
      y: (pdfCanvas.height - m.y) / scale,
      size: 8,
      borderWidth: 2,
      borderColor: color
    });

    // draw number
    pages[m.pageIndex].drawText(String(index + 1), {
      x: m.x / scale + 10,
      y: (pdfCanvas.height - m.y) / scale + 5,
      size: 12,
      color: color
    });
  });

  const edited = await pdf.save();
  const fd = new FormData();

  fd.append("structureProblems", JSON.stringify(problems));
  fd.append("markedFloorPlan", new Blob([edited], { type: "application/pdf" }), "marked.pdf");

  problems.forEach((p, i) => {
    if (p.images) {
      Array.from(p.images).forEach(img => {
        fd.append(`issueImages_${i}`, img);
      });
    }
  });

  const res = await fetch(API + "/api/issues/create", {
    method: "POST",
    headers: { Authorization: "Bearer " + token },
    body: fd
  });

  output.textContent = await res.text();
}
</script>

</body>
</html>
