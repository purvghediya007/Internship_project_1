<style>
body {
  background: #f1f5f9;
}

/* PDF Container */
.pdf-wrapper {
  width: 100%;
  overflow-x: auto;
  background: #e5e7eb;
  padding: 10px;
  border-radius: 8px;
}

/* Canvas */
#pdfCanvas {
  max-width: 100%;
  height: auto;
  border: 2px solid #000;
  touch-action: manipulation;
}

/* Structure card */
.problem {
  border: 1px solid #d1d5db;
  padding: 12px;
  border-radius: 8px;
  margin-top: 12px;
  background: #fff;
}

/* Legend */

  margin-right: 16px;
  font-weight: 600;
}

  .legend span {
    display: block;
    margin-bottom: 6px;
  }
}
/* ====================================================
   CREATE ISSUE PAGE - Professional CSS
   Color Palette: 60% Primary, 30% Secondary, 10% Accent
   Primary: #E8F4F8 (60%) - Light sky blue background
   Secondary: #4A6B8A (30%) - Calm blue-gray
   Accent: #5D8A66 (10%) - Natural sage green
==================================================== */

:root {
  /* Primary Color (60% of design) */
  --primary-light: #E8F4F8;    /* Backgrounds */
  --primary-medium: #D8ECF4;   /* Cards, containers */
  --primary-dark: #C8E4F0;     /* Hover states */
  
  /* Secondary Color (30% of design) */
  --secondary-light: #5D7A94;  /* Text, icons */
  --secondary-medium: #4A6B8A; /* Buttons, important elements */
  --secondary-dark: #3A5670;   /* Hover states, borders */
  
  /* Accent Color (10% of design) */
  --accent-light: #6D9A7A;     /* Success states, highlights */
  --accent-medium: #5D8A66;    /* Success buttons */
  --accent-dark: #4D7A56;      /* Hover states */
  
  /* Neutral Colors */
  --white: #FFFFFF;
  --gray-light: #F8FAFC;
  --gray-medium: #E2E8F0;
  --gray-dark: #94A3B8;
  --text-primary: #1E293B;
  --text-secondary: #475569;
  --text-muted: #64748B;
  
  /* Status Colors */
  --status-crack: #EF4444;     /* Red for cracks */
  --status-dampness: #3B82F6;  /* Blue for dampness */
  --status-both: #10B981;      /* Green for both */
  --status-other: #6B7280;     /* Gray for other */
  
  /* Shadows */
  --shadow-sm: 0 2px 8px rgba(30, 41, 59, 0.04);
  --shadow-md: 0 4px 12px rgba(30, 41, 59, 0.08);
  --shadow-lg: 0 8px 24px rgba(30, 41, 59, 0.12);
  --shadow-xl: 0 12px 32px rgba(30, 41, 59, 0.16);
  
  /* Border Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 999px;
  
  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
  
  /* Spacing */
  --space-xs: 0.5rem;
  --space-sm: 0.75rem;
  --space-md: 1rem;
  --space-lg: 1.5rem;
  --space-xl: 2rem;
}

/* ================= BASE RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: linear-gradient(135deg, var(--primary-light) 0%, #F0F9FF 100%);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ================= NAVBAR - Professional Design ================= */
.navbar {
  background: linear-gradient(135deg, var(--secondary-medium) 0%, var(--secondary-dark) 100%);
  padding: var(--space-md) var(--space-lg);
  box-shadow: var(--shadow-lg);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  position: sticky;
  top: 0;
  z-index: 1000;
  backdrop-filter: blur(10px);
}

.navbar-brand {
  font-weight: 700;
  font-size: 1.25rem;
  background: linear-gradient(135deg, #FFFFFF 0%, #F1F5F9 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.02em;
}

.navbar .text-white {
  font-size: 0.95rem;
  opacity: 0.95;
  font-weight: 500;
  display: flex;
  gap: var(--space-sm);
  align-items: center;
}

.navbar .text-white strong {
  background: rgba(255, 255, 255, 0.15);
  padding: 0.25rem 0.75rem;
  border-radius: var(--radius-full);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

/* ================= MAIN CONTAINER ================= */
.container.my-4 {
  padding: var(--space-lg);
  max-width: 1200px;
  margin: 0 auto;
}

/* ================= ALERT STYLES ================= */
#noBasePdf.alert {
  background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
  border: 2px solid #F59E0B;
  color: #92400E;
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  margin-bottom: var(--space-lg);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  box-shadow: var(--shadow-md);
  animation: slideIn 0.3s ease-out;
}

#noBasePdf.alert::before {
  content: "⚠️";
  font-size: 1.25rem;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ================= LEGEND SECTION - Beautiful Design ================= */
.legend.mb-3 {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: var(--space-md) var(--space-lg);
  margin-bottom: var(--space-lg);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-md);
  box-shadow: var(--shadow-md);
  border: 1px solid var(--gray-medium);
  animation: fadeIn 0.5s ease-out;
}

.legend span {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-weight: 600;
  font-size: 0.875rem;
  padding: var(--space-sm);
  border-radius: var(--radius-md);
  background: var(--gray-light);
  transition: all var(--transition-fast);
}

.legend span:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}

.legend span[style*="color:red"] {
  color: var(--status-crack);
  border-left: 4px solid var(--status-crack);
}

.legend span[style*="color:blue"] {
  color: var(--status-dampness);
  border-left: 4px solid var(--status-dampness);
}

.legend span[style*="color:green"] {
  color: var(--status-both);
  border-left: 4px solid var(--status-both);
}

.legend span[style*="color:black"] {
  color: var(--status-other);
  border-left: 4px solid var(--status-other);
}

.legend span::before {
  content: "●";
  font-size: 1.5rem;
}

/* ================= ADD STRUCTURE BUTTON ================= */
.btn-outline-primary.w-100.mb-3 {
  background: var(--white);
  border: 2px dashed var(--secondary-medium);
  color: var(--secondary-medium);
  padding: var(--space-lg);
  border-radius: var(--radius-lg);
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: var(--space-xl) !important;
  transition: all var(--transition-normal);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}

.btn-outline-primary.w-100.mb-3:hover {
  background: linear-gradient(135deg, var(--primary-medium) 0%, var(--primary-light) 100%);
  border-color: var(--secondary-dark);
  color: var(--secondary-dark);
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}

.btn-outline-primary.w-100.mb-3::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.6s;
}

.btn-outline-primary.w-100.mb-3:hover::before {
  left: 100%;
}

/* ================= STRUCTURE CARDS ================= */
#problems {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
}

.problem {
  background: linear-gradient(135deg, var(--white) 0%, var(--gray-light) 100%);
  border: 1px solid var(--gray-medium);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  box-shadow: var(--shadow-md);
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
  animation: cardAppear 0.4s ease-out;
}

.problem:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
  border-color: var(--secondary-light);
}

.problem::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(to bottom, var(--secondary-medium), var(--accent-medium));
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
}

.problem h6 {
  color: var(--secondary-dark);
  font-size: 1.1rem;
  margin-bottom: var(--space-md);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.problem h6::before {
  content: "🏗️";
  font-size: 1.2rem;
}

.problem .form-select,
.problem .form-control {
  border: 2px solid var(--gray-medium);
  border-radius: var(--radius-md);
  padding: 0.75rem;
  font-size: 0.9rem;
  margin-bottom: var(--space-sm);
  background: var(--white);
  transition: all var(--transition-fast);
}

.problem .form-select:focus,
.problem .form-control:focus {
  border-color: var(--secondary-medium);
  box-shadow: 0 0 0 3px rgba(74, 107, 138, 0.1);
  outline: none;
}

.problem textarea.form-control {
  min-height: 100px;
  resize: vertical;
}

.problem input[type="file"] {
  padding: 0.5rem;
  background: var(--gray-light);
  border-radius: var(--radius-md);
  cursor: pointer;
}

.problem input[type="file"]::-webkit-file-upload-button {
  background: var(--secondary-medium);
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-sm);
  margin-right: 1rem;
  cursor: pointer;
  transition: background var(--transition-fast);
}

.problem input[type="file"]::-webkit-file-upload-button:hover {
  background: var(--secondary-dark);
}

/* ================= HR DIVIDER ================= */
hr {
  margin: var(--space-xl) 0;
  border: none;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gray-medium), transparent);
}

/* ================= PDF CONTROLS ================= */
.d-flex.gap-2.mb-2 {
  background: var(--white);
  padding: var(--space-sm);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  margin-bottom: var(--space-lg);
  display: inline-flex;
  gap: var(--space-sm);
}

.d-flex.gap-2.mb-2 .btn-secondary {
  background: var(--secondary-medium);
  border: none;
  color: white;
  padding: 0.75rem 1.5rem;
  border-radius: var(--radius-md);
  font-weight: 600;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}

.d-flex.gap-2.mb-2 .btn-secondary:hover {
  background: var(--secondary-dark);
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}

/* ================= PDF VIEWER - Professional Design ================= */
.pdf-wrapper {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-xl);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--gray-medium);
  position: relative;
  overflow: hidden;
  min-height: 500px;
}

.pdf-wrapper::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--secondary-medium), var(--accent-medium));
}

#pdfCanvas {
  width: 100% !important;
  height: auto !important;
  border-radius: var(--radius-md);
  border: 1px solid var(--gray-medium);
  box-shadow: var(--shadow-sm);
  display: block;
  margin: 0 auto;
  cursor: crosshair;
  transition: transform var(--transition-normal);
}

#pdfCanvas:hover {
  transform: scale(1.01);
}

/* ================= SUBMIT BUTTON ================= */
.btn-success.w-100.mt-3 {
  background: linear-gradient(135deg, var(--accent-medium) 0%, var(--accent-dark) 100%);
  border: none;
  color: white;
  padding: var(--space-lg);
  border-radius: var(--radius-lg);
  font-weight: 700;
  font-size: 1.1rem;
  margin-top: var(--space-xl) !important;
  transition: all var(--transition-normal);
  box-shadow: 0 8px 32px rgba(93, 138, 102, 0.3);
  position: relative;
  overflow: hidden;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.btn-success.w-100.mt-3:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(93, 138, 102, 0.4);
  background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent-medium) 100%);
}

.btn-success.w-100.mt-3::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
  transition: left 0.6s;
}

.btn-success.w-100.mt-3:hover::after {
  left: 100%;
}

/* ================= OUTPUT AREA ================= */
pre#output {
  background: var(--text-primary);
  color: var(--accent-light);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-top: var(--space-xl);
  font-family: 'Monaco', 'Menlo', monospace;
  font-size: 0.875rem;
  overflow-x: auto;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--gray-dark);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes cardAppear {
  0% {
    opacity: 0;
    transform: scale(0.95) translateY(10px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

@keyframes pulse {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.7;
  }
}

/* ================= MOBILE RESPONSIVE DESIGN ================= */
@media (max-width: 768px) {
  :root {
    --space-lg: 1rem;
    --space-xl: 1.5rem;
  }
  
  .navbar {
    padding: var(--space-md);
    flex-direction: column;
    gap: var(--space-sm);
  }
  
  .navbar .text-white {
    flex-direction: column;
    gap: var(--space-xs);
    align-items: flex-start;
  }
  
  .legend.mb-3 {
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-sm);
    padding: var(--space-md);
  }
  
  #problems {
    grid-template-columns: 1fr;
    gap: var(--space-md);
  }
  
  .problem {
    padding: var(--space-md);
  }
  
  .pdf-wrapper {
    padding: var(--space-md);
    min-height: 400px;
  }
  
  .d-flex.gap-2.mb-2 {
    flex-direction: column;
    width: 100%;
  }
  
  .d-flex.gap-2.mb-2 .btn-secondary {
    width: 100%;
    justify-content: center;
  }
  
  .btn-success.w-100.mt-3 {
    padding: var(--space-lg);
    font-size: 1rem;
  }
}

/* ================= TABLET RESPONSIVE DESIGN ================= */
@media (min-width: 769px) and (max-width: 1024px) {
  .legend.mb-3 {
    grid-template-columns: repeat(2, 1fr);
  }
  
  #problems {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .pdf-wrapper {
    min-height: 600px;
  }
}

/* ================= DESKTOP ENHANCEMENTS ================= */
@media (min-width: 1025px) {
  .container.my-4 {
    padding: var(--space-xl) var(--space-lg);
  }
  
  .pdf-wrapper {
    min-height: 700px;
    max-height: 75vh;
    overflow-y: auto;
  }
  
  #pdfCanvas {
    max-width: 90%;
  }
  
  /* Hover effects for desktop only */
  .problem:hover::before {
    width: 6px;
    transition: width var(--transition-normal);
  }
  
  .legend span {
    cursor: pointer;
  }
}

/* ================= SCROLLBAR STYLING ================= */
::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: var(--primary-light);
  border-radius: var(--radius-full);
}

::-webkit-scrollbar-thumb {
  background: var(--secondary-light);
  border-radius: var(--radius-full);
  border: 2px solid var(--primary-light);
}

::-webkit-scrollbar-thumb:hover {
  background: var(--secondary-medium);
}

/* ================= PRINT STYLES ================= */
@media print {
  .navbar,
  .d-flex.gap-2.mb-2,
  .btn-success.w-100.mt-3,
  pre#output {
    display: none !important;
  }
  
  .pdf-wrapper {
    box-shadow: none;
    border: 1px solid #ccc;
    page-break-inside: avoid;
  }
  
  .problem {
    page-break-inside: avoid;
    border: 1px solid #ddd;
    box-shadow: none;
  }
}

/* ================= UTILITY CLASSES ================= */
.mb-3 {
  margin-bottom: var(--space-lg) !important;
}

.mt-3 {
  margin-top: var(--space-lg) !important;
}

.w-100 {
  width: 100% !important;
}

.d-none {
  display: none !important;
}

/* ================= FOCUS VISIBILITY ================= */
*:focus {
  outline: 2px solid var(--secondary-medium);
  outline-offset: 2px;
}

*:focus:not(:focus-visible) {
  outline: none;
}
</style>
</head>

</div>

<script>
  
/* ================= CONFIG ================= */
const API = "http://localhost:5000";
const token = localStorage.getItem("token");

if (!token) location.href = "../login.html";

/* ================= USER INFO ================= */
const userInfo = JSON.parse(localStorage.getItem("userInfo"));
document.getElementById("floorText").innerText = "Floor: " + userInfo.floorNumber;
document.getElementById("officeText").innerText = "Office: " + userInfo.officeNumber;

/* ================= STATE ================= */
let problems = []; // each problem has its own pdfMarks
let pdfDocJs;
let basePdfUrl;
let pageIndex = 0;
let scale = 1.4;

/* ================= LOAD BASE PDF ================= */
async function loadBasePdf() {
  const res = await fetch(API + "/api/floor-plans/my", {
    headers: { Authorization: "Bearer " + token }
  });

  if (!res.ok) return;

  const data = await res.json();
  if (!data.planPdf) return;

  basePdfUrl = data.planPdf;
  pdfDocJs = await pdfjsLib.getDocument(basePdfUrl).promise;
  renderPage();
}
loadBasePdf();

/* ================= STRUCTURE ================= */
window.addProblem = function () {
  const i = problems.length;

  problems.push({
    pdfMarks: [],
    issueType: null,
    crackType: null,
    dampnessLevel: null
  });

  const div = document.createElement("div");
  div.className = "problem";
  div.innerHTML = `
    <h6>Structure ${i + 1}</h6>

    <select class="form-select mb-1"
      onchange="problems[${i}].structureType=this.value">
      <option value="">Structure</option>
      <option>wall</option><option>beam</option><option>column</option>
      <option>roof</option><option>floor</option><option>facade</option><option>other</option>
    </select>

    <select class="form-select mb-1"
      onchange="problems[${i}].direction=this.value">
      <option value="">Direction</option>
      <option>north</option><option>south</option><option>east</option><option>west</option>
    </select>

    <select class="form-select mb-1"
      onchange="handleIssue(${i}, this.value)">
      <option value="">Issue</option>
      <option value="crack">Crack</option>
      <option value="dampness">Dampness</option>
      <option value="crack_dampness">Crack + Dampness</option>
      <option value="other">Other</option>
    </select>

    <!-- Crack Type -->
    <select id="crack_${i}" class="form-select mb-1 d-none"
      onchange="problems[${i}].crackType=this.value">
      <option value="">Crack Type</option>
      <option>minor</option>
      <option>medium</option>
      <option>severe</option>
    </select>

    <!-- Dampness Level -->
    <select id="damp_${i}" class="form-select mb-1 d-none"
      onchange="problems[${i}].dampnessLevel=this.value">
      <option value="">Dampness Level</option>
      <option>low</option>
      <option>medium</option>
      <option>high</option>
    </select>

    <select class="form-select mb-1"
      onchange="problems[${i}].riskLevel=this.value">
      <option value="">Risk Level</option>
      <option>low</option><option>medium</option><option>high</option>
    </select>

    <textarea class="form-control mb-1"
      placeholder="Description"
      onchange="problems[${i}].description=this.value"></textarea>

    <input type="file" class="form-control" multiple
      onchange="problems[${i}].images=this.files" />
  `;

  document.getElementById("problems").appendChild(div);
};

function handleIssue(i, value) {
  problems[i].issueType = value;

  const crack = document.getElementById(`crack_${i}`);
  const damp = document.getElementById(`damp_${i}`);

  crack.classList.add("d-none");
  damp.classList.add("d-none");

  if (value === "crack") {
    crack.classList.remove("d-none");
  }

  if (value === "dampness") {
    damp.classList.remove("d-none");
  }

  if (value === "crack_dampness") {
    crack.classList.remove("d-none");
    damp.classList.remove("d-none");
  }
}





/* ================= PDF RENDER ================= */
async function renderPage() {
  const page = await pdfDocJs.getPage(pageIndex + 1);
  const viewport = page.getViewport({ scale });

  pdfCanvas.width = viewport.width;
  pdfCanvas.height = viewport.height;

  const ctx = pdfCanvas.getContext("2d");
  await page.render({ canvasContext: ctx, viewport }).promise;

  // draw all marks per structure
  problems.forEach(problem => {
    problem.pdfMarks.forEach((m, index) => {
      if (m.pageIndex === pageIndex) {
        const x = m.x * viewport.width;
        const y = m.y * viewport.height;

        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.strokeStyle = m.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = m.color;
        ctx.font = "14px Arial";
        ctx.fillText(index + 1, x + 10, y - 10);
      }
    });
  });

  pdfCanvas.onclick = e => {
    if (!problems.length) return alert("Add structure first");

    const rect = pdfCanvas.getBoundingClientRect();
    const clickX = (e.clientX - rect.left) / rect.width;
    const clickY = (e.clientY - rect.top) / rect.height;

    const p = problems[problems.length - 1];
    const color = getColor(p.issueType);

    p.pdfMarks.push({
      pageIndex,
      x: clickX,
      y: clickY,
      color
    });

    renderPage();
  };
}

function nextPage() {
  if (pageIndex < pdfDocJs.numPages - 1) {
    pageIndex++;
    renderPage();
  }
}

function prevPage() {
  if (pageIndex > 0) {
    pageIndex--;
    renderPage();
  }
}

function getColor(type) {
  return type === "crack" ? "red"
    : type === "dampness" ? "blue"
    : type === "crack_dampness" ? "green"
    : "black";
}

/* ================= SUBMIT ISSUE ================= */
async function submitIssue() {
  const bytes = await fetch(basePdfUrl).then(r => r.arrayBuffer());
  const pdf = await PDFLib.PDFDocument.load(bytes);
  const pages = pdf.getPages();

  problems.forEach(problem => {
    problem.pdfMarks.forEach((m, index) => {
      const page = pages[m.pageIndex];
      const { width, height } = page.getSize();

      const x = m.x * width;
      const y = height - (m.y * height);

      const color =
        m.color === "red" ? PDFLib.rgb(1,0,0) :
        m.color === "blue" ? PDFLib.rgb(0,0,1) :
        m.color === "green" ? PDFLib.rgb(0,1,0) :
        PDFLib.rgb(0,0,0);

      page.drawCircle({
        x, y,
        size: 8,
        borderWidth: 2,
        borderColor: color
      });

      page.drawText(String(index + 1), {
        x: x + 10,
        y: y + 5,
        size: 12,
        color
      });
    });
  });

  const edited = await pdf.save();
  const fd = new FormData();

  fd.append("structureProblems", JSON.stringify(problems));
  fd.append("markedFloorPlan", new Blob([edited], { type: "application/pdf" }));

  problems.forEach((p, i) => {
    if (p.images) {
      [...p.images].forEach(img => fd.append(`issueImages_${i}`, img));
    }
  });

  await fetch(API + "/api/issues/create", {
    method: "POST",
    headers: { Authorization: "Bearer " + token },
    body: fd
  });

  alert("Issue submitted successfully");
}
</script>
