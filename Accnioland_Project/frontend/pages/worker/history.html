<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Issue History | AccionLAND - RVS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
body{
  font-family:"Inter",sans-serif;
  background:#f8fafc;
}

/* ===== NAVBAR ===== */
.topbar{
  background:linear-gradient(90deg,#0b5ed7,#2563eb);
  box-shadow:0 14px 40px rgba(2,6,23,0.25);
}

/* .meta-pill{
  background:rgba(255,255,255,0.15);
  border-radius:999px;
  padding:6px 12px;
  font-size:13px;
  font-weight:800;
  color:#fff;
} */
 /* ===== TOPBAR META PILLS (FIXED SIZE) ===== */

.meta-pill {
  display: inline-flex;
  align-items: center;
  height: 42px;                  /* match icon button height */
  padding: 0 16px;               /* horizontal only */
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  /* background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25); */
  background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.18);
  border-radius: 25px;
  backdrop-filter: blur(6px);
  line-height: 1;                /* prevent vertical shift */
}

.page-wrap{
  max-width:1200px;
  margin:30px auto;
  padding:0 15px;
}

/* ===== GRID ===== */
.spot-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}
@media(max-width:992px){
  .spot-grid{grid-template-columns:1fr;}
}

/* ===== CARD ===== */
.spot-card{
  background:#fff;
  border-radius:20px;
  border:1px solid #e5e7eb;
  box-shadow:0 12px 30px rgba(15,23,42,0.08);
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
  transition:0.25s;
}
.spot-card:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 40px rgba(15,23,42,0.12);
}

.spot-top{
  padding:16px;
  background:linear-gradient(180deg,#f8fafc,#ffffff);
  border-bottom:1px solid #eef2f7;
  display:flex;
  justify-content:space-between;
}

.spot-title{
  font-weight:900;
  font-size:17px;
  margin:0;
}

.spot-pill{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  font-size:13px;
  font-weight:800;
}

.spot-body{
  padding:16px;
  display:flex;
  flex-direction:column;
  flex:1;
}

/* ===== INFO TAGS ===== */
.kv{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.kv span{
  font-size:12px;
  padding:6px 10px;
  border-radius:14px;
  background:#f1f5f9;
  border:1px solid #e5e7eb;
  font-weight:700;
}

/* ===== PHOTOS ONE LINE ===== */
.photo-grid{
  display:flex;
  gap:12px;
  margin-top:12px;
  overflow-x:auto;
}
.photo{
  min-width:140px;
  height:130px;
  object-fit:cover;
  border-radius:16px;
  border:1px solid #e5e7eb;
  flex-shrink:0;
  cursor:pointer;
}

/* ===== RESOLUTION OVERLAY ===== */
.resolution-overlay{
  position:absolute;
  inset:0;
  background:#ffffff;
  border-radius:20px;
  padding:20px;
  display:none;
  z-index:5;
}

.resolution-overlay.active{
  display:block;
}

.resolution-image{
  width:40%;
  max-width:100%;
  height:60%;
  object-fit:contain;
  border-radius:18px;
  border:1px solid #e5e7eb;
  display:block;
  margin-bottom:12px;
}

.resolution-close{
  position:absolute;
  top:15px;
  right:15px;
  border:none;
  background:#111827;
  color:#fff;
  border-radius:999px;
  width:30px;
  height:30px;
  font-weight:900;
  cursor:pointer;
}

.status-badge{
  font-size:12px;
  font-weight:900;
  padding:6px 12px;
  border-radius:999px;
}

.status-in-progress{
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#92400e;
}

.status-resolved{
  background:#dcfce7;
  border:1px solid #bbf7d0;
  color:#065f46;
}
/* ================= ICON EXPAND NAV BUTTON ================= */

.icon-nav-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 48px;
  width: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.08);
  color: #fff;
  cursor: pointer;
  transition: all 0.50s ease;
  position: relative;
  padding: 0;              /* remove bootstrap padding */
}

/* ICON FIX */
.icon-nav-btn i {
  font-size: 20px;
  line-height: 1;          /* remove vertical shift */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* TEXT (hidden by default) */
.icon-nav-btn span {
  white-space: nowrap;
  margin-left: 10px;
  opacity: 0;
  max-width: 0;
  overflow: hidden;
  transition: all 0.35s ease;
  font-size: 14px;
}

/* HOVER EXPAND */
.icon-nav-btn:hover {
  width: 140px;
  border-radius: 50px;
  background: #ffffff;
  color: #1e40af;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* SHOW TEXT */
.icon-nav-btn:hover span {
  opacity: 1;
  max-width: 100px;
}

/* ICON COLOR ON HOVER */
.icon-nav-btn:hover i {
  color: #1e40af;
}
.icon-nav-btn + .icon-nav-btn {
  margin-left: 10px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-3 topbar">
  <div class="d-flex justify-content-between w-100 align-items-center">
    <span class="navbar-brand fw-bold">AccionLAND - RVS</span>
    <div class="d-flex gap-2">
      <span class="meta-pill">Floor: <span id="floorText"></span></span>
      <span class="meta-pill">Office: <span id="officeText"></span></span>
      <!-- <button class="btn btn-light btn-sm fw-bold px-3 rounded-pill"
        onclick="window.history.back()">
        <i class="bi bi-arrow-left"></i> Back
      </button> -->
      <button class="icon-nav-btn" onclick="window.history.back()">
  <i class="bi bi-arrow-left"></i>
  <span>Back</span>
</button>
      <!-- <button class="btn btn-light btn-sm fw-bold px-3 rounded-pill"
        onclick="logoutUser()">
        Logout
      </button> -->
      <button class="icon-nav-btn" onclick="logoutUser()">
  <i class="bi bi-box-arrow-right"></i>
  <span>Logout</span>
</button>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <h4 class="fw-bold mb-4">
    <i class="bi bi-clock-history text-primary me-2"></i>
    My Issue History
  </h4>

  <div id="issuesContainer"></div>
</div>

<!-- RESOLVE MODAL -->
<div class="modal fade" id="resolveModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3">
      <div class="modal-body">
        <h5 class="fw-bold mb-3">Resolve Structure</h5>

        <textarea id="resolveDesc" class="form-control mb-3"
          placeholder="Enter resolution description"></textarea>

        <input type="file" id="resolveImages"
          class="form-control mb-3"
          multiple accept="image/*"/>

        <div id="previewContainer"
          class="d-flex gap-2 flex-wrap mb-3"></div>

        <button class="btn btn-success w-100 fw-bold"
          onclick="submitResolve()">
          Submit Resolution
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API="https://accionland-rvs.onrender.com";
const token=localStorage.getItem("token");
if(!token) location.href="../login.html";

document.getElementById("floorText").innerText=localStorage.getItem("floorNumber");
document.getElementById("officeText").innerText=localStorage.getItem("officeNumber");

let currentIssueId=null;
let currentSpotIndex=null;

async function loadHistory(){
  const res = await fetch(API + "/api/issues/my",{
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();
  const container = document.getElementById("issuesContainer");
  container.innerHTML = "";

  if(!data.length){
    container.innerHTML="<div class='text-muted fw-bold'>No Issues Found</div>";
    return;
  }

  data.forEach(issue=>{
    const grid=document.createElement("div");
    grid.className="spot-grid";

    issue.structureProblems.forEach((spot,index)=>{
      const photos=spot.images||[];
      const resolutionPhotos=spot.resolution?.images||[];
      const isResolved=spot.status==="resolved";
      const resolutionId=`resolution_${issue._id}_${index}`;

      const card=document.createElement("div");
      card.className="spot-card";

      card.innerHTML=`
        <div class="spot-top">
          <div>
            <p class="spot-title">
              <i class="bi bi-geo-fill text-primary"></i>
              Spot #${index+1}
            </p>
            <div class="text-muted small">
              ${new Date(issue.createdAt).toLocaleString()}
            </div>
          </div>

          <div class="d-flex flex-column align-items-end gap-2">
            ${
              isResolved
              ? `<span class="status-badge status-resolved"
                   style="cursor:pointer"
                   onclick="openResolution('${resolutionId}')">
                   <i class="bi bi-check-circle-fill"></i> Resolved
                 </span>`
              : `<span class="status-badge status-in-progress">
                   <i class="bi bi-hourglass-split"></i> In Progress
                 </span>`
            }
            <span class="spot-pill">${spot.riskLevel}</span>
          </div>
        </div>

        <div class="spot-body">
          <div class="kv">
            <span>Structure: ${spot.structureType}</span>
            <span>Direction: ${spot.direction}</span>
            <span>Issue: ${spot.issueType}</span>
          </div>

          <div class="mt-2 fw-semibold">
            Description: ${spot.description || "No Description"}
          </div>

          <div class="mt-3">
            <strong>Photos:</strong>
            ${
              photos.length
              ? `<div class="photo-grid">
                  ${photos.map(img=>`
                    <img src="${img}" class="photo"
                      onclick="window.open('${img}','_blank')" />
                  `).join("")}
                </div>`
              : `<div class="text-muted small mt-2">
                   No Photos Uploaded
                 </div>`
            }
          </div>

          ${
            !isResolved
            ? `<button class="btn btn-success btn-sm mt-3"
                 onclick="openResolve('${issue._id}',${index})">
                 Resolve
               </button>`
            : ""
          }
        </div>

        ${
          isResolved
          ? `
            <div class="resolution-overlay" id="${resolutionId}">
              <button class="resolution-close"
                onclick="closeResolution('${resolutionId}')">✕</button>

              <h5 class="fw-bold mb-3">
                <i class="bi bi-check-circle-fill text-success"></i>
                Resolution Details
              </h5>

              <div class="fw-semibold mb-3">
               Resolution: ${spot.resolution?.description || "No Description"}
              </div>

              ${
                resolutionPhotos.length
                ? resolutionPhotos.map(img=>`
                   <img src="${img}"
                        class="resolution-image"
                        onclick="window.open('${img}','_blank')" />
                  `).join("")
                : `<div class="text-muted small">No Resolution Photos</div>`
              }
            </div>
          `
          : ""
        }
      `;

      grid.appendChild(card);
    });

    container.appendChild(grid);
  });
}

function openResolution(id){
  document.getElementById(id).classList.add("active");
}
function closeResolution(id){
  document.getElementById(id).classList.remove("active");
}

function openResolve(issueId,index){
  currentIssueId=issueId;
  currentSpotIndex=index;

  document.getElementById("resolveDesc").value="";
  document.getElementById("resolveImages").value="";
  document.getElementById("previewContainer").innerHTML="";

  new bootstrap.Modal(
    document.getElementById("resolveModal")
  ).show();
}

document.addEventListener("change",function(e){
  if(e.target.id==="resolveImages"){
    const preview=document.getElementById("previewContainer");
    preview.innerHTML="";
    Array.from(e.target.files).forEach(file=>{
      const img=document.createElement("img");
      img.src=URL.createObjectURL(file);
      img.style.width="80px";
      img.style.height="80px";
      img.style.objectFit="cover";
      img.style.borderRadius="10px";
      preview.appendChild(img);
    });
  }
});

async function submitResolve(){
  const desc=document.getElementById("resolveDesc").value.trim();
  if(!desc) return alert("Description required");

  const fd=new FormData();
  fd.append("description",desc);

  const files=document.getElementById("resolveImages").files;
  Array.from(files).forEach(f=>{
    fd.append("resolutionImages",f);
  });

  const res=await fetch(
    API+`/api/issues/${currentIssueId}/spot/${currentSpotIndex}/resolve`,
    {
      method:"PATCH",
      headers:{ Authorization:"Bearer "+token },
      body:fd
    }
  );

  if(res.ok){
    bootstrap.Modal
      .getInstance(document.getElementById("resolveModal"))
      .hide();
    loadHistory();
  }else{
    alert("Failed to resolve");
  }
}

function logoutUser(){
  localStorage.removeItem("token");
  location.href="../login.html";
}

loadHistory();
</script>

</body>
</html>
