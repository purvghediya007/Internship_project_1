<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Issue History | AccionLAND - RVS</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg1:#f8fafc;
  --bg2:#eef2ff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --shadow:0 16px 40px rgba(15,23,42,0.08);
  --shadow2:0 22px 55px rgba(15,23,42,0.12);

  --brand1:#0b5ed7;
  --brand2:#2563eb;
  --brand3:#1d4ed8;

  --green1:#16a34a;
  --green2:#22c55e;
}

body{
  font-family:"Inter",sans-serif;
  background: radial-gradient(1200px 700px at 20% 0%, #dbeafe 0%, transparent 55%),
              radial-gradient(1200px 700px at 80% 0%, #e0e7ff 0%, transparent 55%),
              linear-gradient(180deg,var(--bg1),var(--bg2));
}

.topbar{
  background:linear-gradient(90deg,var(--brand1),var(--brand2));
  box-shadow:0 14px 40px rgba(2,6,23,0.25);
  position:sticky;
  top:0;
  z-index:50;
}

.brand{font-weight:900;}

.meta-pill{
  background:rgba(255,255,255,0.15);
  border-radius:999px;
  padding:6px 12px;
  font-size:13px;
  font-weight:800;
  color:#fff;
}

.page-wrap{
  max-width:1100px;
  margin:25px auto 60px auto;
  padding:0 12px;
}

.issue-card{
  background:#fff;
  border-radius:22px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:20px;
  transition:0.3s;
}
.issue-card:hover{transform:translateY(-3px); box-shadow:var(--shadow2);}

.structure-card{
  border-radius:16px;
  border:1px solid var(--border);
  padding:14px;
  margin-top:12px;
  background:#f8fafc;
}

.status-badge{
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.status-progress{
  background:#fff7ed;
  border:1px solid #fde68a;
  color:#92400e;
}

.status-resolved{
  background:#dcfce7;
  border:1px solid rgba(34,197,94,0.3);
  color:#166534;
}

.btn-resolve{
  background:linear-gradient(90deg,var(--green1),var(--green2));
  border:none;
  color:#fff;
  font-weight:800;
  border-radius:12px;
}

.modal-content{
  border-radius:22px !important;
}

.image-preview{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid #ddd;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark px-3 topbar">
  <div class="d-flex justify-content-between w-100 align-items-center">
    <span class="navbar-brand brand">
      AccionLAND - RVS
    </span>
    <div class="d-flex gap-2">
      <span class="meta-pill">Floor: <span id="floorText"></span></span>
      <span class="meta-pill">Office: <span id="officeText"></span></span>
      <button class="btn btn-light btn-sm fw-bold px-3"
        style="border-radius:999px;"
        onclick="logoutUser()">
        Logout
      </button>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <h4 class="fw-bold mb-3">
    <i class="bi bi-clock-history text-primary me-2"></i>
    My Issue History
  </h4>

  <div id="issuesContainer"></div>
</div>

<!-- RESOLVE MODAL -->
<div class="modal fade" id="resolveModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3">
      <div class="modal-body">
        <h5 class="fw-bold mb-3">Resolve Structure</h5>

        <textarea id="resolveDesc" class="form-control mb-3"
          placeholder="Enter resolution description"></textarea>

        <input type="file" id="resolveImages" class="form-control mb-3"
          multiple accept="image/*"/>

        <div id="previewContainer" class="d-flex gap-2 flex-wrap mb-3"></div>

        <button class="btn btn-resolve w-100"
          onclick="submitResolve()">
          Submit Resolution
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API="https://accionland-rvs.onrender.com";
const token=localStorage.getItem("token");
if(!token) location.href="../login.html";

document.getElementById("floorText").innerText=localStorage.getItem("floorNumber");
document.getElementById("officeText").innerText=localStorage.getItem("officeNumber");

let currentIssueId=null;
let currentSpotIndex=null;

async function loadHistory(){
  const res=await fetch(API+"/api/issues/my",{
    headers:{Authorization:"Bearer "+token}
  });
  const data=await res.json();
  const container=document.getElementById("issuesContainer");
  container.innerHTML="";

  data.forEach(issue=>{
    const card=document.createElement("div");
    card.className="issue-card";

    card.innerHTML=`
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="fw-bold">Office ${issue.officeNumber}</div>
        <div class="small text-muted">
          ${new Date(issue.createdAt).toLocaleString()}
        </div>
      </div>
    `;

    issue.structureProblems.forEach((spot,index)=>{
      const statusClass=spot.status==="resolved"?"status-resolved":"status-progress";
      const statusText=spot.status==="resolved"?"Resolved":"In Progress";

      const sDiv=document.createElement("div");
      sDiv.className="structure-card";

      sDiv.innerHTML=`
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <strong>${spot.structureType}</strong> - ${spot.direction}
          </div>
          <span class="status-badge ${statusClass}">
            ${statusText}
          </span>
        </div>
        <div class="small text-muted mt-1">
          Risk: ${spot.riskLevel}
        </div>
        ${
          spot.status==="in_progress"
          ? `<button class="btn btn-resolve btn-sm mt-2"
              onclick="openResolve('${issue._id}',${index})">
              Resolve
            </button>`
          : ""
        }
      `;

      card.appendChild(sDiv);
    });

    container.appendChild(card);
  });
}

function openResolve(issueId,index){
  currentIssueId=issueId;
  currentSpotIndex=index;
  document.getElementById("resolveDesc").value="";
  document.getElementById("resolveImages").value="";
  document.getElementById("previewContainer").innerHTML="";
  new bootstrap.Modal(document.getElementById("resolveModal")).show();
}

document.getElementById("resolveImages").addEventListener("change",function(){
  const preview=document.getElementById("previewContainer");
  preview.innerHTML="";
  Array.from(this.files).forEach(file=>{
    const img=document.createElement("img");
    img.src=URL.createObjectURL(file);
    img.className="image-preview";
    preview.appendChild(img);
  });
});

async function submitResolve(){
  const desc=document.getElementById("resolveDesc").value.trim();
  if(!desc) return alert("Description required");

  const fd=new FormData();
  fd.append("description",desc);

  const files=document.getElementById("resolveImages").files;
  Array.from(files).forEach(f=>{
    fd.append("resolutionImages",f);
  });

  const res=await fetch(
    API+`/api/issues/${currentIssueId}/spot/${currentSpotIndex}/resolve`,
    {
      method:"PATCH",
      headers:{Authorization:"Bearer "+token},
      body:fd
    }
  );

  if(res.ok){
    bootstrap.Modal.getInstance(document.getElementById("resolveModal")).hide();
    loadHistory();
  }else{
    alert("Failed to resolve");
  }
}

function logoutUser(){
  localStorage.removeItem("token");
  location.href="../login.html";
}

loadHistory();
</script>

</body>
</html>
