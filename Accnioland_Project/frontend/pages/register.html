<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | AccionLAND Inspection System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  

  <style>
    .register-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-card {
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }
  </style>
</head>

<body>

<div class="register-wrapper">
  <div class="card register-card">

    <!-- Header -->
    <div class="text-center mb-4">
      <i class="fa-solid fa-user-gear fa-2x text-primary mb-2"></i>
      <h4 class="fw-semibold">Create Account</h4>
      <p class="text-muted small">
        Register for AccionLAND Inspection System
      </p>
    </div>

    <!-- User Type -->
    <div class="mb-3">
      <label class="form-label">Register As</label>
      <select class="form-select" id="userType" onchange="toggleRegisterFields()">
        <option value="office_worker">Office Worker</option>
        <option value="manager">Manager</option>
      </select>
    </div>
<div class="mb-3">
  <label class="form-label">Building Name</label>
  <input type="text" id="regBuilding" class="form-control" placeholder="e.g. SkyTower">
</div>
    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" id="regEmail" class="form-control" placeholder="name@company.com">
    </div>

    <!-- Office Worker Fields -->
    <div id="workerFields">

      <div class="mb-3">
        <label class="form-label">Floor Number</label>
        <input type="number" id="regFloor" class="form-control" placeholder="e.g. 2">
      </div>

      <div class="mb-3">
        <label class="form-label">Office Number</label>
        <input type="number" id="regOffice" class="form-control" placeholder="e.g. 201">
      </div>

    </div>

    <!-- Password -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" id="regPassword" class="form-control" placeholder="Create strong password">
    </div>

    <!-- Register Button -->
    <!-- <button class="btn btn-primary w-100 mt-2" onclick="handleRegister()">
      <i class="bi bi-person-plus-fill me-1"></i> Register
    </button> -->
    <button id="registerBtn" class="btn btn-primary w-100 mt-2" onclick="handleRegisterWithLoader()">
  <span id="registerBtnContent">
    <i class="bi bi-person-plus-fill me-1"></i> Register
  </span>
  <span id="registerSpinner" class="d-none">
    <span class="spinner-border spinner-border-sm me-2"></span>
    Creating Account...
  </span>
</button>

    <!-- Footer -->
    <div class="text-center mt-3">
      <small class="text-muted">
        Already have an account?
        <a href="login.html" class="text-primary fw-medium">Login</a>
      </small>
    </div>

  </div>
</div>

<!-- Scripts -->
<script>
function toggleRegisterFields() {
  const type = document.getElementById("userType").value;
  document.getElementById("workerFields").style.display =
    type === "office_worker" ? "block" : "none";
}
</script>
<script>
async function handleRegisterWithLoader() {
  const btn = document.getElementById("registerBtn");
  const content = document.getElementById("registerBtnContent");
  const spinner = document.getElementById("registerSpinner");

  // Prevent multiple clicks
  btn.disabled = true;

  // Show spinner
  content.classList.add("d-none");
  spinner.classList.remove("d-none");

  try {
    // Call your existing register function
    await handleRegister();
  } catch (error) {
    console.error(error);
  }

  // If register fails and page doesn't redirect
  setTimeout(() => {
    btn.disabled = false;
    spinner.classList.add("d-none");
    content.classList.remove("d-none");
  }, 3000);
}
</script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
