<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Accnioland Inspection System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/layout.css">

  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
  </style>
</head>

<body>

<div class="login-wrapper">
  <div class="card login-card">

    <!-- Header -->
    <div class="text-center mb-4">
      <i class="fa-solid fa-building fa-2x text-primary mb-2"></i>
      <h4 class="fw-semibold">Accnioland Inspection</h4>
      <p class="text-muted small">Secure access to maintenance system</p>
    </div>

    <!-- Role Selection -->
    <div class="mb-3">
      <label class="form-label">Login As</label>
      <select class="form-select" id="userType" onchange="toggleFields()">
        <option value="office_worker">Office Worker</option>
        <option value="manager">Manager</option>
      </select>
    </div>

    <!-- EMAIL (FOR BOTH) -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input
        type="email"
        id="email"
        class="form-control"
        placeholder="name@company.com"
      />
    </div>

    <!-- FLOOR (OFFICE WORKER ONLY) -->
    <div class="mb-3" id="floorField">
      <label class="form-label">Floor Number</label>
      <input
        type="number"
        id="floor"
        class="form-control"
        placeholder="e.g. 2"
      />
    </div>

    <!-- PASSWORD -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        type="password"
        id="password"
        class="form-control"
        placeholder="••••••••"
      />
    </div>

    <!-- LOGIN BUTTON -->
    <button class="btn btn-primary w-100 mt-2" onclick="handleLogin()">
      <i class="bi bi-box-arrow-in-right me-1"></i> Login
    </button>

    <!-- Footer -->
    <div class="text-center mt-3">
      <small class="text-muted">
        New here?
        <a href="register.html" class="text-primary fw-medium">Create account</a>
      </small>
    </div>

  </div>
</div>

<!-- Scripts -->
<script>
function toggleFields() {
  const type = document.getElementById("userType").value;
  document.getElementById("floorField").style.display =
    type === "office_worker" ? "block" : "none";
}
</script>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
