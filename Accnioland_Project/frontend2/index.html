<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accnioland Inspection System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Inter", sans-serif;
      background-color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>

<body>

<div class="text-center">
  <div class="spinner-border text-primary mb-3" role="status"></div>
  <p class="text-muted">Checking session...</p>
</div>

<script>
(function redirectUser() {
  const token = localStorage.getItem("token");
  const userType = localStorage.getItem("userType");

  // Not logged in
  if (!token || !userType) {
    window.location.href = "pages/login.html";
    return;
  }

  // Role-based redirect
  if (userType === "office_worker") {
    window.location.href = "pages/worker/create-issue.html";
  } else if (userType === "manager") {
    window.location.href = "pages/manager/dashboard.html";
  } else {
    // fallback safety
    localStorage.clear();
    window.location.href = "pages/login.html";
  }
})();
</script>

</body>
</html>
