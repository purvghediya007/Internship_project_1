<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Accnioland – Manager Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: "Inter", sans-serif;
      background: #f1f5f9;
    }

    .stat-card {
      border-radius: 14px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      transition: 0.2s ease;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.10);
    }

    .issue-card {
      border-radius: 14px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      transition: 0.2s ease;
    }
    .issue-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.10);
    }

    .filter-card {
      border-radius: 14px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .chart-box {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand fw-semibold">
    Accnioland – Manager Dashboard
  </span>

  <div class="d-flex gap-2">
    <a href="upload-floor.html" class="btn btn-outline-light btn-sm">
      <i class="bi bi-upload"></i> Upload Floor Plan
    </a>
    <button onclick="logout()" class="btn btn-outline-danger btn-sm">
      <i class="bi bi-box-arrow-right"></i> Logout
    </button>
  </div>
</nav>

<div class="container my-4">

  <!-- FILTER -->
  <div class="card filter-card mb-4">
    <div class="card-body">
      <h6 class="fw-semibold mb-3">Dashboard Filters</h6>

      <div class="row g-2">
        <div class="col-md-3">
          <input type="number" id="floorInput" class="form-control" placeholder="Floor number">
        </div>

        <div class="col-md-3">
          <input type="date" id="dateInput" class="form-control">
        </div>

        <div class="col-md-3">
          <select id="statusInput" class="form-select">
            <option value="">All Status</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
          </select>
        </div>

        <div class="col-md-3">
          <select id="riskInput" class="form-select">
            <option value="">All Risk</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="col-12 d-flex gap-2 mt-2">
          <button class="btn btn-primary" onclick="applyDashboardFilter()">
            Apply Filter
          </button>
          <button class="btn btn-outline-secondary" onclick="resetDashboardFilter()">
            Reset
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="card stat-card p-3">
        <div class="fw-semibold">Total Issues</div>
        <h3 id="totalIssues" class="mb-0">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card p-3">
        <div class="fw-semibold">Total Problems</div>
        <h3 id="totalProblems" class="mb-0">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card p-3">
        <div class="fw-semibold">Open Issues</div>
        <h3 id="openIssues" class="mb-0">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card stat-card p-3">
        <div class="fw-semibold">High Risk</div>
        <h3 id="highRisk" class="mb-0">0</h3>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="chart-box">
        <h6 class="fw-semibold">Status Breakdown</h6>
        <canvas id="statusChart"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="chart-box">
        <h6 class="fw-semibold">Risk Breakdown</h6>
        <canvas id="riskChart"></canvas>
      </div>
    </div>
  </div>

  <!-- ISSUES -->
  <h5 class="fw-semibold mb-3">Reported Issues</h5>
  <div id="issuesContainer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = "http://localhost:5000";
const token = localStorage.getItem("token");
const userType = localStorage.getItem("userType");

let ALL_ISSUES = [];
let statusChartInstance = null;
let riskChartInstance = null;

if (!token || userType !== "manager") {
  localStorage.clear();
  location.href = "../login.html";
}

function logout() {
  localStorage.clear();
  location.href = "../login.html";
}

/* ================= LOAD ALL ISSUES ================= */
async function loadAllIssues() {
  const res = await fetch(API + "/api/issues/all", {
    headers: { Authorization: "Bearer " + token }
  });

  ALL_ISSUES = await res.json();
  renderIssues(ALL_ISSUES);
}

/* ================= DASHBOARD SUMMARY ================= */
async function loadDashboardSummary(filters = {}) {
  const params = new URLSearchParams(filters).toString();
  const url = API + "/api/analytics/summary" + (params ? `?${params}` : "");

  const res = await fetch(url, {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();
  const summary = data.summary;

  // cards
  document.getElementById("totalIssues").innerText = summary.totalIssues;
  document.getElementById("totalProblems").innerText = summary.totalProblems;
  document.getElementById("openIssues").innerText = summary.statusStats.open || 0;
  document.getElementById("highRisk").innerText = summary.riskStats.high || 0;

  // charts
  renderStatusChart(summary.statusStats);
  renderRiskChart(summary.riskStats);
}

/* ================= APPLY FILTER ================= */
function applyDashboardFilter() {
  const floor = document.getElementById("floorInput").value;
  const date = document.getElementById("dateInput").value;
  const status = document.getElementById("statusInput").value;
  const risk = document.getElementById("riskInput").value;

  // filter issues list (frontend)
  let filtered = [...ALL_ISSUES];

  if (floor) filtered = filtered.filter(i => i.floorNumber === Number(floor));
  if (date) filtered = filtered.filter(i => i.createdAt?.startsWith(date));
  if (status) filtered = filtered.filter(i => (i.status || "open") === status);

  if (risk) {
    filtered = filtered.filter(i =>
      (i.structureProblems || []).some(p => p.riskLevel === risk)
    );
  }

  renderIssues(filtered);

  // filter dashboard summary (backend)
  const summaryFilters = {};
  if (floor) summaryFilters.floor = floor;
  if (date) summaryFilters.date = date;
  if (status) summaryFilters.status = status;
  if (risk) summaryFilters.risk = risk;

  loadDashboardSummary(summaryFilters);
}

/* ================= RESET FILTER ================= */
function resetDashboardFilter() {
  document.getElementById("floorInput").value = "";
  document.getElementById("dateInput").value = "";
  document.getElementById("statusInput").value = "";
  document.getElementById("riskInput").value = "";

  renderIssues(ALL_ISSUES);
  loadDashboardSummary();
}

/* ================= RENDER ISSUES ================= */
function renderIssues(issues) {
  const container = document.getElementById("issuesContainer");
  container.innerHTML = "";

  if (!issues.length) {
    container.innerHTML = `
      <div class="alert alert-info">
        No issues found for selected filter.
      </div>
    `;
    return;
  }

  issues.forEach(issue => {
    const card = document.createElement("div");
    card.className = "card issue-card mb-3";

    card.innerHTML = `
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <h6 class="mb-1">
              Floor ${issue.floorNumber} | Office ${issue.officeNumber}
            </h6>
            <small class="text-muted">
              Reported on: ${new Date(issue.createdAt).toLocaleDateString()}
            </small>
          </div>
          <span class="badge bg-secondary text-capitalize">
            ${issue.status || "open"}
          </span>
        </div>

        <hr />

        <a href="issue-details.html?id=${issue._id}" class="btn btn-sm btn-primary">
          View Details
        </a>
      </div>
    `;

    container.appendChild(card);
  });
}

/* ================= CHARTS ================= */
function renderStatusChart(stats) {
  const ctx = document.getElementById("statusChart");

  const data = {
    labels: ["Open", "In Progress", "Resolved"],
    datasets: [{
      label: "Issues",
      data: [
        stats.open || 0,
        stats.in_progress || 0,
        stats.resolved || 0
      ]
    }]
  };

  if (statusChartInstance) statusChartInstance.destroy();

  statusChartInstance = new Chart(ctx, {
    type: "bar",
    data,
  });
}

function renderRiskChart(stats) {
  const ctx = document.getElementById("riskChart");

  const data = {
    labels: ["Low", "Medium", "High"],
    datasets: [{
      label: "Problems",
      data: [
        stats.low || 0,
        stats.medium || 0,
        stats.high || 0
      ]
    }]
  };

  if (riskChartInstance) riskChartInstance.destroy();

  riskChartInstance = new Chart(ctx, {
    type: "pie",
    data,
  });
}

/* ================= INIT ================= */
(async function init() {
  await loadAllIssues();       // default show all issues
  await loadDashboardSummary(); // default summary for all
})();
</script>

</body>
</html>
