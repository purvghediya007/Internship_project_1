<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

<style>

body {
  background: linear-gradient(180deg, #eef2f7, #f8fafc);
  /* font-family: "Inter", system-ui, sans-serif; */
}

/* ================= NAVBAR ================= */
.navbar {
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

/* ================= BADGES ================= */
.badge-open {
  background: linear-gradient(135deg, #fde68a, #facc15);
  color: #000;
}
.badge-progress {
  background: linear-gradient(135deg, #7dd3fc, #38bdf8);
}
.badge-resolved {
  background: linear-gradient(135deg, #86efac, #4ade80);
}

/* ================= HEADER CARD ================= */
.card {
  border-radius: 14px;
  border: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

.card-header {
  background: linear-gradient(135deg, #f8fafc, #eef2f7);
  font-weight: 600;
  border-bottom: 1px solid #e5e7eb;
}

/* ================= PDF SECTION ================= */
.pdf-box {
  height: 65vh;
  background: #1f2937;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: #1f2937;
}

/* ================= STRUCTURE PROBLEM CARDS ================= */
.problem-card {
  border-left: 6px solid #2563eb;
  transition: all 0.25s ease;
  background: linear-gradient(180deg, #ffffff, #f9fafb);
}

.problem-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.12);
  border-left-color: #1d4ed8;
}

.problem-card h6 {
  letter-spacing: 0.3px;
}

/* ================= STRUCTURE DETAILS ================= */
.problem-card .small {
  color: #374151;
}

/* ================= VIEW PHOTOS BUTTON ================= */
.problem-card button {
  border-radius: 999px;
  font-weight: 500;
  transition: all 0.25s ease;
}

.problem-card button:hover {
  background: #2563eb;
  color: #fff;
  transform: scale(1.03);
}

/* ================= MODAL ================= */
.modal-content {
  border-radius: 16px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.25);
}

.modal-header {
  background: linear-gradient(135deg, #f8fafc, #eef2f7);
  border-bottom: 1px solid #e5e7eb;
}

.modal-title {
  font-weight: 600;
}

/* ================= IMAGE GALLERY ================= */
#imageGallery img {
  border-radius: 12px;
  transition: all 0.25s ease;
}

#imageGallery img:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
  .pdf-box {
    height: 50vh;
  }
}
</style>

</head>

<body>

<!-- TOP BAR -->
<nav class="navbar navbar-dark bg-primary px-3">
  <a href="dashboard.html" class="text-white text-decoration-none">
    <i class="bi bi-arrow-left"></i> Back to Dashboard
  </a>
  <span id="issueStatus" class="badge badge-open">Open</span>
</nav>

<div class="container my-4">

<!-- HEADER -->
<div class="card mb-4">
  <div class="card-body d-flex justify-content-between flex-wrap">
    <div>
      <h5 class="mb-1">Office Inspection Issue</h5>
      <small class="text-muted">Reported by Office Worker</small>
    </div>
    <div class="fw-semibold">
      Floor: <span id="issueFloor"></span> |
      Office: <span id="issueOffice"></span>
    </div>
  </div>
</div>

<!-- PDF SECTION -->
<div class="row g-3 mb-4">
  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-header fw-semibold">Original Floor Plan</div>
      <div class="pdf-box">
        <iframe id="basePdf"></iframe>
      </div>
    </div>
  </div>

  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-header fw-semibold">Marked Floor Plan</div>
      <div class="pdf-box">
        <iframe id="markedPdf"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- STRUCTURE PROBLEMS -->
<h5 class="mb-3">Reported Structure Problems</h5>
<div id="structureProblems" class="row g-3"></div>

</div>

<!-- IMAGE MODAL -->
<div class="modal fade" id="imageModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Structure Photos</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="imageGallery" class="row g-2"></div>
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API = "http://localhost:5000";
const token = localStorage.getItem("token");

if (!token || localStorage.getItem("userType") !== "manager") {
  location.href = "../login.html";
}

const params = new URLSearchParams(window.location.search);
const issueId = params.get("id");

if (!issueId) {
  alert("Invalid issue");
  location.href = "dashboard.html";
}

async function loadIssue() {
  const res = await fetch(API + "/api/issues/all", {
    headers: { Authorization: "Bearer " + token }
  });

  const issues = await res.json();
  const issue = issues.find(i => i._id === issueId);

  if (!issue) {
    alert("Issue not found");
    location.href = "dashboard.html";
    return;
  }

  issueFloor.textContent = issue.floorNumber;
  issueOffice.textContent = issue.officeNumber;
  issueStatus.textContent = issue.status;
  issueStatus.className = `badge ${statusClass(issue.status)}`;

  basePdf.src = issue.baseFloorPlan;
  markedPdf.src = issue.markedFloorPlan;

  const container = document.getElementById("structureProblems");
  container.innerHTML = "";

  (issue.structureProblems || []).forEach((p, i) => {
    const col = document.createElement("div");
    col.className = "col-12 col-md-6";

    col.innerHTML = `
      <div class="card problem-card p-3 h-100">
        <h6 class="fw-semibold mb-2">
          Structure ${i + 1} – ${p.structureType.toUpperCase()}
        </h6>

        <div class="small mb-1"><strong>Direction:</strong> ${p.direction}</div>
        <div class="small mb-1"><strong>Issue:</strong> ${formatIssue(p.issueType)}</div>

        ${p.crackType ? `<div class="small mb-1"><strong>Crack:</strong> ${p.crackType}</div>` : ""}
        ${p.dampnessLevel ? `<div class="small mb-1"><strong>Dampness:</strong> ${p.dampnessLevel}</div>` : ""}

        <div class="small mb-1"><strong>Risk:</strong> ${p.riskLevel}</div>

        <div class="small text-muted mb-2">
          ${p.description || "No description"}
        </div>

        <button class="btn btn-sm btn-outline-primary mt-auto"
          onclick='showImages(${JSON.stringify(p.images || [])})'>
          📷 View Photos
        </button>
      </div>
    `;
    container.appendChild(col);
  });
}

function showImages(images) {
  const gallery = document.getElementById("imageGallery");
  gallery.innerHTML = "";

  if (!images || images.length === 0) {
    gallery.innerHTML = `
      <div class="text-muted text-center">
        No images uploaded for this structure.
      </div>
    `;
  } else {
    images.forEach(img => {
      const col = document.createElement("div");
      col.className = "col-6 col-md-4";
      col.innerHTML = `
        <img src="${img}"
          class="img-fluid rounded border"
          style="cursor:pointer"
          onclick="window.open('${img}','_blank')">
      `;
      gallery.appendChild(col);
    });
  }

  new bootstrap.Modal(document.getElementById("imageModal")).show();
}

function formatIssue(v) {
  return v === "crack_dampness"
    ? "Crack + Dampness"
    : v.charAt(0).toUpperCase() + v.slice(1);
}

function statusClass(status) {
  return status === "resolved"
    ? "badge-resolved"
    : status === "in_progress"
    ? "badge-progress"
    : "badge-open";
}

loadIssue();
</script>

</body>
</html>
