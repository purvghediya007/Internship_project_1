<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Upload Floor Plan | Accnioland</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

<style>
body {
  background: #f1f5f9;
}

.upload-card {
  max-width: 520px;
  margin: auto;
}

input[type="file"] {
  padding: 8px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<nav class="navbar navbar-dark bg-primary px-3">
  <a href="dashboard.html" class="text-white text-decoration-none">
    <i class="bi bi-arrow-left"></i> Dashboard
  </a>
  <span class="text-white fw-semibold">Upload Floor Plan</span>
</nav>

<div class="container my-5">

<div class="card upload-card shadow-sm">
  <div class="card-body">

    <h5 class="fw-semibold mb-3">
      <i class="bi bi-file-earmark-pdf me-1"></i>
      Upload Base Floor Plan
    </h5>

    <div class="alert alert-info small">
      This PDF will be visible to all office workers on the selected floor.
      <br>
      If office number is provided, only that office will see it.
    </div>

    <!-- FLOOR -->
    <div class="mb-3">
      <label class="form-label fw-medium">Floor Number *</label>
      <input type="number" class="form-control" id="floorNumber" placeholder="e.g. 6" required>
    </div>

    <!-- OFFICE (OPTIONAL) -->
    <div class="mb-3">
      <label class="form-label fw-medium">
        Office Number <span class="text-muted">(optional)</span>
      </label>
      <input type="number" class="form-control" id="officeNumber" placeholder="e.g. 623">
    </div>

    <!-- PDF -->
    <div class="mb-4">
      <label class="form-label fw-medium">Floor Plan PDF *</label>
      <input type="file" class="form-control" id="pdfFile" accept="application/pdf" required>
    </div>

    <button class="btn btn-primary w-100" onclick="uploadFloorPlan()">
      <i class="bi bi-cloud-upload"></i> Upload PDF
    </button>

    <div id="msg" class="small mt-3"></div>

  </div>
</div>

</div>

<script>
const API = "http://localhost:5000";
const token = localStorage.getItem("token");

if (!token || localStorage.getItem("userType") !== "manager") {
  location.href = "../login.html";
}

async function uploadFloorPlan() {
  const floor = document.getElementById("floorNumber").value;
  const office = document.getElementById("officeNumber").value;
  const file = document.getElementById("pdfFile").files[0];
  const msg = document.getElementById("msg");

  if (!floor || !file) {
    msg.innerHTML = `<span class="text-danger">Floor and PDF are required</span>`;
    return;
  }

  const fd = new FormData();
  fd.append("floorNumber", floor);
  if (office) fd.append("officeNumber", office);
  fd.append("planPdf", file);

  try {
    const res = await fetch(API + "/api/floor-plans/upload", {
      method: "POST",
      headers: {
        Authorization: "Bearer " + token
      },
      body: fd
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = `<span class="text-danger">${data.message || "Upload failed"}</span>`;
      return;
    }

    msg.innerHTML = `<span class="text-success">Floor plan uploaded successfully</span>`;
    document.getElementById("pdfFile").value = "";

  } catch (err) {
    msg.innerHTML = `<span class="text-danger">Server error</span>`;
  }
}
</script>

</body>
</html>
